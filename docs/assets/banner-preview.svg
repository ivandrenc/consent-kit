<svg xmlns="http://www.w3.org/2000/svg" width="920" height="460" viewBox="0 0 920 460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-label="consentium cookie banner preview: the initial accept/reject view and the per-category customize panel">
  <defs>
    <filter id="ck-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#131318" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- page backdrop -->
  <rect width="920" height="460" fill="#f1efea"/>

  <!-- ─────────────────────────── Card 1 · initial view ─────────────────────────── -->
  <g>
    <rect x="20" y="40" width="420" height="224" rx="16" fill="#ffffff" stroke="#e4e3df" stroke-width="1" filter="url(#ck-shadow)"/>

    <!-- headline (serif italic, accent-neutral ink) -->
    <text x="44" y="84" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="18" fill="#131318">Your privacy choices</text>

    <!-- body -->
    <text font-size="14" fill="#3a3a44">
      <tspan x="44" y="116">Acme uses cookies for essential functionality and,</tspan>
      <tspan x="44" y="138">with your consent, to understand how the site is</tspan>
      <tspan x="44" y="160">used. You can change your choice at any time.</tspan>
    </text>

    <!-- policy link -->
    <text x="44" y="186" font-size="12" fill="#3a3a44">Cookie policy</text>
    <line x1="44" y1="190" x2="115" y2="190" stroke="#3a3a44" stroke-width="1"/>

    <!-- actions -->
    <g>
      <!-- Customize (ghost) -->
      <rect x="44" y="206" width="86" height="34" rx="8" fill="#ffffff" stroke="#e4e3df" stroke-width="1"/>
      <text x="87" y="228" font-size="14" font-weight="500" fill="#131318" text-anchor="middle">Customize</text>
      <!-- Reject all (ghost) -->
      <rect x="138" y="206" width="86" height="34" rx="8" fill="#ffffff" stroke="#e4e3df" stroke-width="1"/>
      <text x="181" y="228" font-size="14" font-weight="500" fill="#131318" text-anchor="middle">Reject all</text>
      <!-- Accept all (primary) -->
      <rect x="232" y="206" width="96" height="34" rx="8" fill="#1c5b3d"/>
      <text x="280" y="228" font-size="14" font-weight="500" fill="#f4faf6" text-anchor="middle">Accept all</text>
    </g>
  </g>
  <text x="20" y="290" font-size="12" fill="#7c7a74">Initial — accept all · reject all · customize, reject one click away</text>

  <!-- ─────────────────────────── Card 2 · customize panel ─────────────────────────── -->
  <g>
    <rect x="480" y="40" width="420" height="362" rx="16" fill="#ffffff" stroke="#e4e3df" stroke-width="1" filter="url(#ck-shadow)"/>

    <text x="504" y="84" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="18" fill="#131318">Your privacy choices</text>

    <!-- Row: Essential (locked on, disabled toggle) -->
    <line x1="504" y1="104" x2="876" y2="104" stroke="#e4e3df" stroke-width="1"/>
    <text x="504" y="124" font-size="14" font-weight="500" fill="#131318">Essential</text>
    <text font-size="12" fill="#3a3a44">
      <tspan x="504" y="141">Required for the site to work — security, load</tspan>
      <tspan x="504" y="157">balancing, and remembering your privacy choice.</tspan>
      <tspan x="504" y="173">Always on.</tspan>
    </text>
    <g opacity="0.6">
      <rect x="840" y="116" width="36" height="20" rx="10" fill="#ececea"/>
      <circle cx="866" cy="126" r="8" fill="#ffffff"/>
    </g>

    <!-- Row: Analytics (on) -->
    <line x1="504" y1="192" x2="876" y2="192" stroke="#e4e3df" stroke-width="1"/>
    <text x="504" y="212" font-size="14" font-weight="500" fill="#131318">Analytics</text>
    <text font-size="12" fill="#3a3a44">
      <tspan x="504" y="229">Measures how the site is used so we can improve</tspan>
      <tspan x="504" y="245">it. No data is sold or used for advertising.</tspan>
    </text>
    <g>
      <rect x="840" y="204" width="36" height="20" rx="10" fill="#1c5b3d"/>
      <circle cx="866" cy="214" r="8" fill="#ffffff"/>
    </g>

    <!-- Row: Marketing (off) -->
    <line x1="504" y1="264" x2="876" y2="264" stroke="#e4e3df" stroke-width="1"/>
    <text x="504" y="284" font-size="14" font-weight="500" fill="#131318">Marketing</text>
    <text font-size="12" fill="#3a3a44">
      <tspan x="504" y="301">Used to measure and personalise advertising</tspan>
      <tspan x="504" y="317">across sites.</tspan>
    </text>
    <g>
      <rect x="840" y="276" width="36" height="20" rx="10" fill="#ececea"/>
      <circle cx="850" cy="286" r="8" fill="#ffffff"/>
    </g>

    <!-- actions -->
    <g>
      <rect x="504" y="344" width="70" height="34" rx="8" fill="#ffffff" stroke="#e4e3df" stroke-width="1"/>
      <text x="539" y="366" font-size="14" font-weight="500" fill="#131318" text-anchor="middle">Back</text>
      <rect x="582" y="344" width="152" height="34" rx="8" fill="#1c5b3d"/>
      <text x="658" y="366" font-size="14" font-weight="500" fill="#f4faf6" text-anchor="middle">Save preferences</text>
    </g>
  </g>
  <text x="480" y="428" font-size="12" fill="#7c7a74">Customize — per-category toggles; auto-off under DNT / GPC</text>
</svg>
