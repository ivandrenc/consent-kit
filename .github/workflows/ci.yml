name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # `npm install` (not `npm ci`) is used deliberately: `npm ci` does not
      # reliably install platform-specific native optional deps (rollup/rolldown
      # linux binaries) from a lockfile generated on another OS — npm/cli#4828.
      # This step also builds via the `prepare` lifecycle script.
      - name: Install (also builds via prepare)
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Format check
        run: npm run format:check
